<!DOCTYPE html>
<html>

<head>
    <title>Menu Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .menu-card {
            width: 300px;
            background-color: white;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 2px 2px 10px gray;
        }
        
        .menu-card h2 {
            text-align: center;
            color: darkred;
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
        
        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="menu-card">
        <h2>🍽 Food Menu</h2>

        <div class="menu-item">
            <span>Pizza</span>
            <span class="price">₹250</span>
        </div>

        <div class="menu-item">
            <span>Burger</span>
            <span class="price">₹120</span>
        </div>

        <div class="menu-item">
            <span>Pasta</span>
            <span class="price">₹180</span>
        </div>

        <div class="menu-item">
            <span>Cold Coffee</span>
            <span class="price">₹90</span>
        </div>
    </div>

</body>

</html>
